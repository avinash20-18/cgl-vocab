<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC CGL Exam Vocab Platform</title>
    
    <!-- Console warning avoiding icon declaration -->
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    
    <!-- Scripts deferred in correct execution order -->
    <script src="words.js" defer></script>
    <script src="script.js" defer></script>
</head>

<body>

    <main class="quiz-container">
        
        <!-- 1. QUIZ SCREEN -->
        <section id="quiz-box">
            <div class="header">
                <h2 id="q-type">SSC CGL Vocabulary Practice</h2>
                <span class="badge" id="q-progress">Loading...</span>
            </div>

            <!-- Cloze Test Passage display box -->
            <div id="cloze-passage-box" class="cloze-passage-container" style="display: none;">
                <strong>📖 Passage Context:</strong>
                <p id="cloze-passage-text"></p>
            </div>

            <div class="question-box">
                <div class="question-text" id="q-text" aria-live="polite">Loading questions...</div>
                <div class="options-list" id="options-container"></div>
            </div>

            <div class="explanation-box" id="explanation-container" style="display: none;" aria-live="polite">
                <strong>Explanation:</strong> <span id="explanation-text"></span>
            </div>

            <div class="footer">
                <button id="prev-button" class="quiz-btn" onclick="prevQuestion()" style="display: none;">Previous</button>
                <button id="skip-button" class="quiz-btn" onclick="skipQuestion()">Skip Question</button>
                <button id="next-button" class="quiz-btn next-button" onclick="loadNextQuestion()" style="display: none;">Next Question</button>
            </div>
        </section>

        <!-- 2. RESULT SCREEN -->
        <section id="result-box" class="result-screen" style="display: none;">
            <h2>Performance Report Card</h2>
            <hr>
            <div class="score-big" id="final-score">0 / 0</div>
            <p id="accuracy-text">Accuracy Rate: 0%</p>
            <p id="feedback-text" style="font-weight: 600; color: #555;"></p>

            <div class="analysis-container">
                <div class="stat-card total">
                    <span class="stat-label">TOTAL QUESTIONS</span>
                    <span id="stat-total" class="stat-value">0</span>
                </div>
                <div class="stat-card attempted">
                    <span class="stat-label">ATTEMPTED</span>
                    <span id="stat-attempted" class="stat-value">0</span>
                </div>
                <div class="stat-card correct">
                    <span class="stat-label">CORRECT</span>
                    <span id="stat-correct" class="stat-value">0</span>
                </div>
                <div class="stat-card wrong">
                    <span class="stat-label">WRONG</span>
                    <span id="stat-wrong" class="stat-value">0</span>
                </div>
            </div>

            <!-- Detailed Question-by-Question Review -->
            <div id="review-section" class="review-container"></div>

            <div class="result-actions" style="margin-top: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                <button class="restart-btn" onclick="restartQuiz()">Attempt Again</button>
                <button class="quiz-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">⬆️ Scroll to Top</button>
            </div>
        </section>

    </main>

</body>
</html>
